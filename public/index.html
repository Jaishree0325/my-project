<!DOCTYPE html>

<html>
<head>
  <title>Student Attendance</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

  <!-- Student ID -->

  <div id="studentIdSection">
    <img src="image.jpeg" style="width:100px;height:100px;">
    <h2>Enter Student ID</h2>
    <input type="number" id="studentId" placeholder="Enter ID">
    <button onclick="submitId()">Submit</button>
  </div>

  <!-- Options -->

  <div id="optionsSection" class="hidden">
    <h3>Choose an Option</h3>
    <button onclick="showSection('leaveSection')">Leave</button>
    <button onclick="showSection('mealsSection')">Meals</button><br>
    <iframe src="fee.html" width="300" height="400"></iframe><br>
    <button onclick="resetApp()">Logout</button>
  </div>

  <!-- Leave -->

  <div id="leaveSection" class="hidden">
    <h3>Leave Request</h3>
    <p>Student ID: <span id="leaveStudentId"></span></p>

<input type="number" id="room" placeholder="Room Number"><br>

<label>From Date:</label>
<input type="date" id="fromDate"><br>

<label>To Date:</label>
<input type="date" id="toDate"><br>

<label>Reason:</label>
<select id="reasonDropdown" onchange="toggleOtherReason()">
  <option value="">Select a reason</option>
  <option value="hometown">Hometown</option>
  <option value="festival">Festival</option>
  <option value="sick">Sick</option>
  <option value="other">Other</option>
</select><br>

<textarea id="otherReason" placeholder="Enter reason..." style="display:none;"></textarea><br>

<button onclick="submitLeave()">Submit</button>
<button onclick="showSection('optionsSection')">Back</button>

  </div>

  <!-- Meals -->

  <div id="mealsSection" class="hidden">
    <h3>Meals Selection</h3>
    <p>Student ID: <span id="mealsStudentId"></span></p>

<table>
  <tr><td><input type="checkbox" id="morning"></td><td>Morning</td></tr>
  <tr><td><input type="checkbox" id="afternoon"></td><td>Afternoon</td></tr>
  <tr><td><input type="checkbox" id="snacks"></td><td>Snacks</td></tr>
  <tr><td><input type="checkbox" id="dinner"></td><td>Dinner</td></tr>
</table><br>

<button onclick="submitMeals()">Confirm</button>
<button onclick="showSection('optionsSection')">Back</button>

  </div>

</div>

<script>
  
  const BASE_URL = "https://hostel-oba8.onrender.com";


function showSection(id) {
  ["studentIdSection","optionsSection","leaveSection","mealsSection"]
    .forEach(sec => document.getElementById(sec).classList.add("hidden"));

  document.getElementById(id).classList.remove("hidden");

  const studentId = localStorage.getItem("studentId");
  if (studentId) {
    document.getElementById("leaveStudentId").textContent = studentId;
    document.getElementById("mealsStudentId").textContent = studentId;
  }
}

function submitId() {
  const id = document.getElementById("studentId").value.trim();

  if (!id) return alert("Please enter your Student ID.");

  fetch(`${BASE_URL}/api/students`)
    .then(res => res.json())
    .then(data => {
      const exists = data.some(s => s.studentId == id);

      if (!exists) {
        alert("Invalid Student ID");
        return;
      }

      localStorage.setItem("studentId", id);
      showSection("optionsSection");
    })
    .catch(err => console.error(err));
}

// Leave
function submitLeave() {
  const from = document.getElementById("fromDate").value.trim();
  const to = document.getElementById("toDate").value.trim();
  const room = document.getElementById("room").value.trim();
  const reasonDropdown = document.getElementById("reasonDropdown").value;
  const otherReason = document.getElementById("otherReason").value.trim();

  const reason = reasonDropdown === "other" ? otherReason : reasonDropdown;

  if (!from || !to || !room || !reason)
    return alert("Please fill all fields correctly.");

  if (new Date(from) > new Date(to))
    return alert("From Date cannot be later than To Date.");

  fetch(`${BASE_URL}/api/leave`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      studentId: localStorage.getItem("studentId"),
      room,
      fromDate: from,
      toDate: to,
      reason
    })
  })
  .then(res => res.json())
  .then(() => {
    alert("Leave submitted successfully!");
    showSection("optionsSection");
  })
  .catch(err => console.error(err));
}

// Toggle reason
function toggleOtherReason() {
  const dropdown = document.getElementById("reasonDropdown");
  const textarea = document.getElementById("otherReason");

  textarea.style.display = dropdown.value === "other" ? "block" : "none";
}

// Meals
function submitMeals() {
  let meals = ["morning","afternoon","snacks","dinner"]
    .filter(m => document.getElementById(m).checked);

  if (!meals.length) return alert("Select at least one meal.");

  fetch(`${BASE_URL}/api/meals`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      studentId: localStorage.getItem("studentId"),
      meals
    })
  })
  .then(res => res.json())
  .then(() => {
    alert("Meals saved!");
    showSection("optionsSection");
  })
  .catch(err => console.error(err));
}

// Logout
function resetApp() {
  localStorage.removeItem("studentId");
  location.reload();
}
</script>

</body>
</html>
